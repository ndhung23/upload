{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="error-panel">
  <h1>{{ code }}</h1>
  <p>{{ message }}</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard.dashboard') }}">Back to dashboard</a>
</div>
{% endblock %}
{% block public_content %}
<div class="login-page">
  <div class="login-panel text-center">
    <h1>{{ code }}</h1>
    <p>{{ message }}</p>
    <a class="btn btn-primary" href="{{ url_for('auth.login') }}">Login</a>
  </div>
</div>
{% endblock %}
