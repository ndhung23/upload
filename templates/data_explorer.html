{% extends "base.html" %}
{% block title %}Admin Data Explorer{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.css">
{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Admin Data Explorer</h1>
  <p>Inspect SQLite tables and run SELECT-only queries.</p>
</div>
<ul class="nav nav-tabs mb-3" role="tablist">
  <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tableTab" type="button">Tables</button></li>
  <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#sqlTab" type="button">SQL Console</button></li>
</ul>
<div class="tab-content">
  <div class="tab-pane fade show active" id="tableTab">
    <div class="row g-3">
      <div class="col-lg-2">
        <div class="filter-panel">
          <div class="panel-title">Tables</div>
          <div class="list-group table-list" id="tableList">
            {% for table in tables %}
            <button class="list-group-item list-group-item-action {% if loop.first %}active{% endif %}" data-table="{{ table }}" type="button">{{ table }}</button>
            {% endfor %}
          </div>
        </div>
      </div>
      <div class="col-lg-10">
        <div class="table-panel">
          <div class="d-flex flex-wrap gap-2 align-items-end mb-3">
            <div>
              <label class="form-label small">Search</label>
              <input id="explorerSearch" class="form-control form-control-sm" placeholder="Search DIM/users text">
            </div>
            <div class="fact-filter">
              <label class="form-label small">Month</label>
              <input id="explorerMonth" class="form-control form-control-sm" placeholder="24-Apr">
            </div>
            <div class="fact-filter">
              <label class="form-label small">CustomerID</label>
              <input id="explorerCustomerID" class="form-control form-control-sm" type="number">
            </div>
            <div class="fact-filter">
              <label class="form-label small">MarketID</label>
              <input id="explorerMarketID" class="form-control form-control-sm" type="number">
            </div>
            <button id="explorerApply" class="btn btn-sm btn-primary" type="button">Apply</button>
          </div>
          <div id="explorerMeta" class="small text-secondary mb-2"></div>
          <div class="table-responsive">
            <table id="explorerTable" class="table table-sm table-hover align-middle w-100">
              <thead><tr id="explorerHead"></tr></thead>
              <tbody id="explorerBody"></tbody>
            </table>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <button id="explorerPrev" class="btn btn-sm btn-outline-secondary" type="button">Previous</button>
            <span id="explorerPageInfo" class="small text-secondary"></span>
            <button id="explorerNext" class="btn btn-sm btn-outline-secondary" type="button">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="tab-pane fade" id="sqlTab">
    <div class="form-panel">
      <label class="form-label">SQL Console</label>
      <textarea id="sqlInput" class="form-control sql-editor" rows="5">SELECT * FROM FACT_ETD LIMIT 100</textarea>
      <div class="d-flex gap-2 mt-3">
        <button id="runSql" class="btn btn-primary" type="button">Run SELECT</button>
        <div id="sqlStatus" class="small text-secondary align-self-center"></div>
      </div>
    </div>
    <div class="table-panel mt-3">
      <div class="table-responsive">
        <table class="table table-sm table-hover align-middle">
          <thead><tr id="sqlHead"></tr></thead>
          <tbody id="sqlBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.datatables.net/2.1.8/js/dataTables.js"></script>
<script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.js"></script>
<script src="{{ url_for('static', filename='js/data_explorer.js') }}"></script>
{% endblock %}
